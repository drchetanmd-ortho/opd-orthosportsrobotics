<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review QR Cards · Dr Chetan M Dojode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --navy:#0d2136; --teal:#2aab9a; --star:#fbbc04; --bg:#eef3f3; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--navy); padding:24px; }
  .toolbar{ max-width:820px; margin:0 auto 20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .toolbar h1{ font-size:18px; font-weight:700; flex:1; }
  .toolbar button{ background:var(--teal); color:#fff; border:none; border-radius:10px; padding:10px 16px; font:inherit; font-weight:700; cursor:pointer; }
  .toolbar button:hover{ opacity:.9; }
  .cards{ max-width:820px; margin:0 auto; display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .card{
    background:#fff; width:360px; border-radius:20px; overflow:hidden;
    box-shadow:0 8px 30px rgba(13,33,54,.14); border:1px solid #dde8e6;
  }
  .card-head{ background:var(--navy); color:#fff; text-align:center; padding:22px 18px 18px; }
  .card-head .logo{ display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:11px; background:var(--teal); font-weight:800; font-size:20px; margin-bottom:10px; }
  .card-head h2{ font-size:17px; font-weight:700; }
  .card-head .doc{ font-size:12.5px; opacity:.8; margin-top:3px; }
  .card-body{ text-align:center; padding:24px 18px 20px; }
  .card-body .stars{ color:var(--star); font-size:22px; letter-spacing:3px; margin-bottom:6px; }
  .card-body .prompt{ font-size:15px; font-weight:600; margin-bottom:18px; }
  .qr{ display:inline-block; padding:12px; background:#fff; border:2px solid #eef3f3; border-radius:14px; }
  .qr img, .qr canvas{ display:block; }
  .card-body .scan{ font-size:12.5px; color:#3a5a6a; margin-top:14px; }
  .card-foot{ background:#f4faf9; text-align:center; font-size:11px; color:#3a5a6a; padding:10px; border-top:1px solid #e3efed; }
  @media print{
    body{ background:#fff; padding:0; }
    .toolbar{ display:none; }
    .cards{ gap:0; }
    .card{ box-shadow:none; border:none; page-break-after:always; margin:0 auto; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <h1>Review QR Desk Cards</h1>
    <button onclick="window.print()">🖨 Print</button>
  </div>
  <div class="cards" id="cards"></div>

<script>
  // Must match review.html profile codes and app.js REVIEW_GATE_BASE
  var GATE_BASE = "https://drchetanmd-ortho.github.io/opd-orthosportsrobotics/review.html";
  var PROFILES = [
    { code:"aarna",  name:"Aarna Orthopaedic Clinic" },
    { code:"sparsh", name:"SPARSH Hospital Yelahanka" }
  ];

  var cardsEl = document.getElementById('cards');
  PROFILES.forEach(function(p){
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-head">' +
        '<div class="logo">OSR</div>' +
        '<h2>' + p.name + '</h2>' +
        '<div class="doc">Dr Chetan M Dojode</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="stars">★★★★★</div>' +
        '<div class="prompt">Rate your experience</div>' +
        '<div class="qr" id="qr-' + p.code + '"></div>' +
        '<div class="scan">Scan with your phone camera</div>' +
      '</div>' +
      '<div class="card-foot">Thank you for helping us improve.</div>';
    cardsEl.appendChild(card);

    new QRCode(document.getElementById('qr-' + p.code), {
      text: GATE_BASE + '?c=' + p.code,
      width: 200, height: 200,
      colorDark: "#0d2136", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  });
</script>
</body>
</html>
